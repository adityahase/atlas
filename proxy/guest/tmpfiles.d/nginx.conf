# nginx admin-socket runtime dir (proxy-design.md §8). nginx creates the admin
# socket here (listen unix:/run/nginx/admin.sock); this guarantees the dir exists
# with the right perms at every boot before nginx.service starts, so the socket
# lands in a 0750 dir owned by root. (The pidfile is /run/nginx.pid, loose in
# /run, which systemd always provides — only the socket needs a managed subdir.)
#
# Type Path        Mode UID  GID  Age Argument
d      /run/nginx  0750 root root -   -
