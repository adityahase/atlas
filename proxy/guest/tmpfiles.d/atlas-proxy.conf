# Atlas reverse proxy runtime dir (proxy-design.md §8). nginx creates the admin
# socket here (listen unix:); this guarantees the dir exists with the right
# perms at every boot before atlas-proxy.service starts, so the socket and the
# pidfile land in a 0750 dir owned by root.
#
# Type Path             Mode UID  GID  Age Argument
d      /run/atlas-proxy  0750 root root -   -
