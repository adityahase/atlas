<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Site not found</title>
  <style>
    :root { color-scheme: light dark; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f5f6; color: #1f272e;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #18181b; color: #e4e4e7; }
      .card { background: #27272a; box-shadow: none; }

    .card {
      max-width: 28rem; padding: 2.5rem; border-radius: 12px;
      background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.08); text-align: center;
    }
    h1 { font-size: 1.5rem; margin: 0 0 .5rem; }
    p { margin: 0; line-height: 1.5; color: #74808b; }
  </style>
</head>
<body>
  <div class="card">
    <h1>This site isn't here</h1>
    <p>No site is mapped to this address yet. If you just signed up, give it a

</html>
