# Atlas reverse proxy — static config (proxy-design.md §5).
#
# This file is baked into /opt/atlas-proxy/conf by build.sh and never changes
# per-subdomain: the subdomain -> site-address map lives in a lua_shared_dict
# (router.lua reads it, admin.lua writes it), so a mapping change is a single
# atomic memory write with ZERO reload. The only things that change here are
# deliberate stack/config updates rolled as a new proxy snapshot.
#
# The region wildcard (e.g. blr1) and the cert path are NOT hard-coded: the
# region is read once at init from /var/lib/atlas-proxy/region (written when the
# proxy VM is configured), and the cert/key are pushed into the guest by Atlas.

user  root;
worker_processes  auto;
pid  /run/atlas-proxy/nginx.pid;

events {
    worker_connections  16384;
}

http {
    include       /opt/atlas-proxy/conf/mime.types;
    default_type  application/octet-stream;

    access_log  /var/log/atlas-proxy/access.log;
    error_log   /var/log/atlas-proxy/error.log;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;
    server_tokens   off;

    # lua-resty-core is mandatory (nginx refuses to start without it); make the
    # pure-Lua resty libs and our own modules resolvable.
    lua_package_path  "/usr/local/share/lua/5.1/?.lua;/opt/atlas-proxy/lua/?.lua;;";

    # The authoritative in-process map: subdomain -> site address. 64m holds
    # ~250k+ entries; 10k writes/day is nothing for a shared dict.
    lua_shared_dict  sites  64m;

    # Init: load the region and repopulate the dict from the on-disk snapshot
    # (map.json) so a fresh worker comes up already routing. The file is read
    # ONLY here, at start; Atlas's reconcile is the durable source of truth.
    init_by_lua_block {
        local persist = require("persist")
        local f = io.open("/var/lib/atlas-proxy/region", "r")
        if f then
            atlas_region = (f:read("*l") or ""):gsub("%s+", "")
            f:close()
        else
            atlas_region = ""
        end
    }
    init_worker_by_lua_block {
        require("persist").load()
    }

    # --- TLS (A+ per 2026 Mozilla Intermediate; DHE dropped, OCSP retired) ---
    ssl_certificate      /var/lib/atlas-proxy/certs/fullchain.pem;
    ssl_certificate_key  /var/lib/atlas-proxy/certs/privkey.pem;

    ssl_protocols  TLSv1.2 TLSv1.3;
    ssl_ciphers  ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers  off;
    ssl_ecdh_curve  X25519:prime256v1:secp384r1;

    ssl_session_timeout  1d;
    ssl_session_cache    shared:MozSSL:10m;
    ssl_session_tickets  off;

    # --- North side: :80 redirect-only (+ optional ACME passthrough) ---
    server {
        listen      80 default_server;
        listen      [::]:80 default_server;
        server_name _;

        # Only here if a node ever does HTTP-01 for a non-wildcard cert; the
        # regional wildcard is DNS-01, so this is a harmless passthrough.
        location ^~ /.well-known/acme-challenge/ {
            root /var/lib/atlas-proxy/acme;
        }
        location / {
            return 308 https://$host$request_uri;
        }
    }

    # --- North side: one :443 server block for ALL subdomains ---
    # v4 listener binds the guest's private addr; the world reaches it on the
    # attached reserved IP via host 1:1 NAT (proxy-design.md §2.2) — nginx is
    # unaware of the translation. v6 listener is the guest's public /128.
    server {
        listen      443 ssl default_server;
        listen      [::]:443 ssl default_server;
        http2  on;
        server_name _;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        set $vm_upstream "";

        # router.lua runs ONLY in the two proxy locations below (not server-wide),
        # so its miss path can render the branded page without ever re-entering
        # the router — no redirect cycle. On a miss it serves the branded
        # not_found.html itself with status 404 (unknown) / 503 (tombstoned);
        # error_page does not intercept a Lua-phase exit, so Lua owns the page.

        # SocketIO — websocket upgrade, long-lived.
        location /socket.io {
            access_by_lua_file /opt/atlas-proxy/lua/router.lua;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_pass $vm_upstream;
        }

        # Everything else — buffering off for Frappe streaming.
        location / {
            access_by_lua_file /opt/atlas-proxy/lua/router.lua;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 600s;
            proxy_buffering off;
            proxy_pass $vm_upstream;
        }
    }

    # --- Admin API: unix socket ONLY, never TCP. File perms are the gate. ---
    server {
        listen  unix:/run/atlas-proxy/admin.sock;
        access_log  /var/log/atlas-proxy/admin.log;

        location / {
            content_by_lua_file /opt/atlas-proxy/lua/admin.lua;
        }
    }
}
